name: Build run Docker container

on:
  push:
    branches:
      - main

jobs:
  
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags $(git rev-list --tags --max-count=1))
          echo "tag=$TAG" >> $GITHUB_OUTPUT
            
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            nicolaboscolo/mywebsite:${{ steps.tag.outputs.tag }}
            nicolaboscolo/mywebsite:latest
          build-args: |
            ANON_KEY=${{ secrets.ANON_KEY }}
          
      -
        name: executing remote ssh commands using ssh key
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: |
              cd website
              screen -S deploy -X quit || true
              : > deploy.log
              screen -dmS deploy bash -c "docker compose pull && docker compose up -d --remove-orphans >> deploy.log 2>&1"
              exit